      .gold-sparkle{

        width:100%;
        height:100%;
        top:0;
        left:0;
        z-index:9999;
      }

      .gold-sparkle span{
        position:absolute;
        width:6px;
        height:6px;
        background:#ffea00;
        border-radius:50%;
        box-shadow:0 0 20px #ffea00;
        animation:sparkle 3s ease-in-out infinite;

      }

      @keyframes sparkle{
        0%{
          transform:scale(0);
          opacity:0;
        }
        50%{
          transform:scale(1);
          opacity:0.8;
        }
        100%{
          transform:scale(0);
          opacity:0;
        }
      }

      .gold-sparkle span:nth-child(1){top:10%;left:20%;animation-delay:0s;}
      .gold-sparkle span:nth-child(2){top:30%;left:80%;animation-delay:1s;}
      .gold-sparkle span:nth-child(3){top:70%;left:40%;animation-delay:2s;}
      .gold-sparkle span:nth-child(4){top:85%;left:70%;animation-delay:1.5s;}
